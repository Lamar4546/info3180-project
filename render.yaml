services:
  - type: web
    name: driftdater
    env: python
    buildCommand:
      bash build.sh
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 4 main:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: driftdater-db
          property: connectionString
      - key: UPLOAD_FOLDER
        value: app/static/uploads
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"

databases:
  - name: driftdater-db
    databaseName: driftdater
    user: driftdater
    plan: free